<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1f1552;
      --bg2: #662a82;
      --glass: rgba(255, 255, 255, .14);
      --line: rgba(255, 255, 255, .28);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, .82);
      --shadow: 0 20px 50px rgba(0, 0, 0, .28);
      --header: rgba(21, 11, 61, .56);
      --btn: #ffffff;
      --btnText: #2d1d62;
      --danger: #ffdedf;
      --font: 'Poppins', sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      font-family: var(--font);
      color: var(--text);
      background: radial-gradient(circle at top, #a04ab4 0%, rgba(160, 74, 180, .2) 18%, transparent 34%), linear-gradient(180deg, #311b79 0%, #29186d 35%, #201356 100%);
      overflow: hidden;
    }

    a {
      text-decoration: none;
      color: #fff;
    }

    .page-bg {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      position: relative;
    }

    .page-bg:before,
    .page-bg:after {
      content: "";
      position: absolute;
      inset: auto;
      pointer-events: none;
    }

    .page-bg:before {
      width: 380px;
      height: 380px;
      background: radial-gradient(circle, rgba(255, 175, 245, .25), transparent 62%);
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      filter: blur(10px);
    }

    .auth-card {
      width: min(430px, 92vw);
      padding: 34px 34px 28px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255, 255, 255, .16), rgba(255, 255, 255, .08));
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
      position: relative;
      z-index: 1;
    }

    .auth-title {
      font-size: 44px;
      line-height: 1.1;
      text-align: center;
      font-weight: 700;
      margin: 0 0 26px;
    }

    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      font-size: 15px;
      margin-bottom: 8px;
      color: var(--muted);
    }

    .input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 2px solid rgba(255, 255, 255, .75);
      padding: 12px 2px;
      color: #fff;
      font-size: 18px;
      outline: none;
    }

    .input::placeholder {
      color: rgba(255, 255, 255, .65);
    }

    .primary-btn {
      width: 100%;
      height: 52px;
      border: none;
      border-radius: 999px;
      background: var(--btn);
      color: var(--btnText);
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
    }

    .auth-link {
      margin-top: 20px;
      text-align: center;
      font-size: 16px;
      color: var(--muted);
    }

    .auth-link a {
      font-weight: 600;
    }

    .status {
      min-height: 24px;
      margin-top: 10px;
      text-align: center;
      color: #fff7c0;
    }

    @media (max-width:768px) {
      .auth-title {
        font-size: 36px;
      }
    }
  </style>
</head>

<body>
  <main class="page-bg">
    <section class="auth-card">
      <h1 class="auth-title">Sign Up</h1>
      <form id="registerForm">
        <div class="field">
          <label for="name">Name</label>
          <input id="name" class="input" type="text" placeholder="Enter your name" required>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" class="input" type="email" placeholder="Enter your email" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" class="input" type="password" placeholder="Create your password" required>
        </div>
        <button type="submit" class="primary-btn">Sign Up</button>
        <p id="status" class="status"></p>
      </form>
      <p class="auth-link">Already have an account? <a href="/login">Back to Login</a></p>
    </section>
  </main>
  <script>
    const form = document.getElementById('registerForm');
    const statusEl = document.getElementById('status');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      statusEl.textContent = 'Creating account...';
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const res = await fetch('/oidc/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include', body: JSON.stringify({ name, email, password }) });
      const data = await res.json();
      if (!res.ok || !data.ok) { 
        statusEl.textContent = data.error || 'Registration failed'; return; 
      }
      statusEl.textContent = 'Registered successfully. Redirecting to login...';
      setTimeout(() => window.location.href = '/login', 1200);
    });
  </script>
</body>

</html>
